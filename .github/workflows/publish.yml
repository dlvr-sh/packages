name: Publish package

on:
  push:
    tags: ['cli-v*', 'mcp-v*', 'sdk-v*', 'n8n-v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    outputs:
      package-dir: ${{ steps.package.outputs.package-dir }}
      expected-version: ${{ steps.package.outputs.expected-version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Select package
        id: package
        shell: bash
        run: |
          case "$GITHUB_REF_NAME" in
            cli-v*)  package_dir=cli; expected_version=${GITHUB_REF_NAME#cli-v} ;;
            mcp-v*)  package_dir=mcp; expected_version=${GITHUB_REF_NAME#mcp-v} ;;
            sdk-v*)  package_dir=sdk; expected_version=${GITHUB_REF_NAME#sdk-v} ;;
            n8n-v*) package_dir=n8n; expected_version=${GITHUB_REF_NAME#n8n-v} ;;
            *) exit 1 ;;
          esac
          echo "PACKAGE_DIR=$package_dir" >> "$GITHUB_ENV"
          echo "EXPECTED_VERSION=$expected_version" >> "$GITHUB_ENV"
          echo "package-dir=$package_dir" >> "$GITHUB_OUTPUT"
          echo "expected-version=$expected_version" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile
      - run: bun run verify

      - name: Verify tag version
        run: node -e "const p=require('./' + process.env.PACKAGE_DIR + '/package.json'); if(p.version !== process.env.EXPECTED_VERSION) throw new Error('Tag and package version differ')"

      - name: Configure temporary npm token
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to next with provenance
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag next --provenance
        env:
          RELEASE_MODE: '1'

  scan-n8n:
    if: startsWith(github.ref_name, 'n8n-v')
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.2'
          package-manager-cache: false

      - name: Scan the published n8n artifact
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.publish.outputs.expected-version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if corepack pnpm dlx @n8n/scan-community-package@latest "@dlvr/n8n-nodes-dlvr@$PACKAGE_VERSION"; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep 10
            fi
          done
          exit 1
